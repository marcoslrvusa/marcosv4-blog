    <line x1="0" y1="22" x2="330" y2="22" stroke="#00ff88" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="16" cy="11" r="4" fill="#00ff88"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="10" fill="#00ff88" opacity="0.8">NVIDIA + MICROSOFT</text>
    <text x="16" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Agentes no Windows</text>
    <text x="16" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#888888">NIM + Azure Local AI</text>
