    <line x1="0" y1="22" x2="330" y2="22" stroke="#ff6b6b" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="16" cy="11" r="4" fill="#ff6b6b"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="10" fill="#ff6b6b" opacity="0.8">NVIDIA RESEARCH</text>
    <text x="16" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Agentes Físicos</text>
    <text x="16" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#888888">CVPR 2026 — Grasping com 94%</text>
  </g>

  <g transform="translate(420, 480)">
    <rect x="0" y="0" width="330" height="80" rx="12" fill="#0a0a1a" stroke="#ffd93d" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="0" y1="22" x2="330" y2="22" stroke="#ffd93d" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="16" cy="11" r="4" fill="#ffd93d"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="10" fill="#ffd93d" opacity="0.8">DEEPMIND</text>
    <text x="16" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Instruções em Linguagem</text>
    <text x="16" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#888888">LLM como juiz interno</text>
