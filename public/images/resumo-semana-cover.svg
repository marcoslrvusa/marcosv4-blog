    <line x1="0" y1="22" x2="360" y2="22" stroke="#7b61ff" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="16" cy="11" r="4" fill="#7b61ff"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="10" fill="#7b61ff" opacity="0.8">CHINA</text>
    <text x="16" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Qwen 3.5 Supera GPT-5</text>
    <text x="16" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#888888">Modelo aberto Apache 2.0</text>
