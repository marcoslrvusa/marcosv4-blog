  <g transform="translate(780, 480)">
    <rect x="0" y="0" width="360" height="80" rx="12" fill="#0a0a1a" stroke="#00ff88" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="0" y1="22" x2="360" y2="22" stroke="#00ff88" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="16" cy="11" r="4" fill="#00ff88"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="10" fill="#00ff88" opacity="0.8">OBSERVAR</text>
