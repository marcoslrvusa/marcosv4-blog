  </text>

  <rect x="60" y="255" width="80" height="3" rx="1.5" fill="url(#accent1)"/>

  <text x="60" y="290" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#888888" letter-spacing="0.5">
    NVIDIA · Microsoft · OpenAI · Qwen 3.5 · DeepMind
  </text>

  <text x="60" y="330" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff">
    $ echo "Agentes físicos · Modelos abertos · GPT-5.5 liberado"
  </text>

  <g transform="translate(60, 380)">
